<!DOCTYPE html>
<html>
<head>
    <title>Extension URL Test</title>
</head>
<body>
    <h1>Extension URL Test</h1>
    <p>Testing chrome.runtime.getURL() functionality:</p>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        // Simulate the getSelectedAzanSource function
        function getTestUrls() {
            const testData = [];
            
            // Test the default URLs that would be generated
            const defaultAzans = {
                'default_adhan': {
                    type: 'default',
                    data: 'chrome-extension://eglgbgmahngnflijjdhghhdbflgdceif/assets/mp3/adhan.mp3',
                    name: 'Default Adhan'
                },
                'solid_adhan': {
                    type: 'default',
                    data: 'chrome-extension://eglgbgmahngnflijjdhghhdbflgdceif/assets/mp3/solid_adhan.mp3',
                    name: 'Solid Adhan'
                },
                'audio_adhan': {
                    type: 'default',
                    data: 'chrome-extension://eglgbgmahngnflijjdhghhdbflgdceif/assets/audio/adhan.mp3',
                    name: 'Audio Adhan'
                }
            };
            
            // Also test with localhost URLs for our test environment
            const localhostAzans = {
                'localhost_default': {
                    type: 'default',
                    data: 'http://localhost:8001/assets/mp3/adhan.mp3',
                    name: 'Localhost Default'
                },
                'localhost_solid': {
                    type: 'default',
                    data: 'http://localhost:8001/assets/mp3/solid_adhan.mp3',
                    name: 'Localhost Solid'
                }
            };
            
            return {...defaultAzans, ...localhostAzans};
        }
        
        // Test URL accessibility
        async function testUrl(url, name) {
            try {
                const audio = new Audio();
                
                return new Promise((resolve) => {
                    audio.oncanplay = () => {
                        console.log(`✅ ${name}: Can play`);
                        resolve({ name, url, status: 'success', message: 'Audio can play' });
                    };
                    
                    audio.onerror = (e) => {
                        console.log(`❌ ${name}: Error -`, e);
                        resolve({ name, url, status: 'error', message: `Error: ${e.target.error?.message || 'Unknown'}` });
                    };
                    
                    audio.onloadstart = () => console.log(`🔄 ${name}: Loading started`);
                    
                    // Set a timeout for cases where neither event fires
                    setTimeout(() => {
                        if (audio.readyState === 0) {
                            resolve({ name, url, status: 'timeout', message: 'Load timeout - possibly CORS or file not found' });
                        }
                    }, 5000);
                    
                    audio.src = url;
                    audio.load();
                });
            } catch (error) {
                return { name, url, status: 'exception', message: error.message };
            }
        }
        
        // Run tests
        async function runTests() {
            const urls = getTestUrls();
            const testResults = [];
            
            for (const [key, azanData] of Object.entries(urls)) {
                console.log(`Testing ${azanData.name}...`);
                const result = await testUrl(azanData.data, azanData.name);
                testResults.push(result);
                
                // Update UI
                const div = document.createElement('div');
                div.style.margin = '10px 0';
                div.style.padding = '10px';
                div.style.border = '1px solid #ccc';
                div.style.borderRadius = '5px';
                
                const statusColor = result.status === 'success' ? '#4CAF50' : 
                                  result.status === 'error' ? '#f44336' : '#ff9800';
                
                div.innerHTML = `
                    <strong style="color: ${statusColor}">${result.name}</strong><br>
                    URL: <code>${result.url}</code><br>
                    Status: <span style="color: ${statusColor}">${result.status}</span><br>
                    Message: ${result.message}
                `;
                
                results.appendChild(div);
            }
            
            console.log('All tests completed:', testResults);
        }
        
        // Start tests
        runTests();
    </script>
</body>
</html>
